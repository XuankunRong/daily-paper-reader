          note: ''
        - query: What are the key challenges in agent safety?
          query_cn: 智能体安全的主要挑战是什么？
          enabled: true
          source: manual
          note: ''
        - query: Recent advances in safe reinforcement learning
          query_cn: 安全强化学习的最新进展
          enabled: true
          source: manual
          note: ''
      updated_at: '2026-06-16T15:27:40.542Z'
    - tag: agentic-rl
      description: 帮我找Agentic RL的相关paper
      enabled: true
      paper_sources:
        - arxiv
      keywords:
        - keyword: agentic reinforcement learning
          keyword_cn: 智能体强化学习
          query: agentic reinforcement learning
        - keyword: reinforcement learning agents
          keyword_cn: 强化学习智能体
          query: reinforcement learning agents
        - keyword: multi-agent reinforcement learning
          keyword_cn: 多智能体强化学习
          query: multi-agent reinforcement learning
      intent_queries:
        - query: What are recent advances in agentic reinforcement learning?
          query_cn: Agentic强化学习的最新进展是什么？
