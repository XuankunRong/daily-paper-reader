          source: manual
          note: ''
        - query: How do autonomous agents use reinforcement learning?
          query_cn: 自主智能体如何使用强化学习？
          enabled: true
          source: manual
          note: ''
      updated_at: '2026-06-16T15:28:12.009Z'
