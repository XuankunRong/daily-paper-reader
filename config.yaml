subscriptions:
  schema_migration:
    stage: A
    diff_threshold_pct: 15
  keyword_recall_mode: or
  intent_profiles:
    - tag: ai-safety
      description: 帮我找AI Safety相关的paper
      enabled: true
      paper_sources:
        - arxiv
      keywords:
        - keyword: jailbreak
          keyword_cn: 越狱攻击
          query: j
        - keyword: safety alignment
          keyword_cn: 安全对齐
          query: a
        - keyword: AI safety
          keyword_cn: 人工智能安全
          query: artificial intelligence safety
      intent_queries:
        - query: research papers on AI alignment and value learning
          query_cn: 关于人工智能对齐和价值学习的研究论文
          enabled: true
          source: manual
          note: ''
      updated_at: '2026-06-16T15:27:02.545Z'
    - tag: agent-safety
      description: 帮我找Agent Safety相关的paper
      enabled: true
      paper_sources:
        - arxiv
      keywords:
        - keyword: AI agent safety
          keyword_cn: AI智能体安全
          query: safety of artificial intelligence agents
        - keyword: agent safety evaluation
          keyword_cn: 智能体安全评估
          query: methods for evaluating safety of autonomous agents
        - keyword: safe reinforcement learning
          keyword_cn: 安全强化学习
          query: reinforcement learning algorithms with safety constraints
      intent_queries:
        - query: How to ensure safety in AI agents?
          query_cn: 如何确保AI智能体的安全？
